[tool.ruff]
target-version = "py311"
line-length = 120
src = ["."]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # bugbear
    "SIM",  # simplify
    "T20",  # print statements (use structlog instead)
]
ignore = [
    "E501",  # line length handled by formatter
    "E402",  # module imports not at top (caused by __future__ annotations pattern)
    "N806",  # variable in function should be lowercase
]

[tool.ruff.lint.isort]
known-first-party = ["agents"]

[tool.pytest.ini_options]
pythonpath = [".."]
testpaths = ["."]
norecursedirs = [".venv", "__pycache__", "node_modules", ".git"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
markers = [
    "integration: marks tests requiring a live database",
]
